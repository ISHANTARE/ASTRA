name: Publish to PyPI

# This workflow triggers automatically whenever you publish a new Release on GitHub.
on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # These permissions are REQUIRED for Trusted Publishing (OIDC)
    permissions:
      id-token: write  # Allows GitHub to request the OIDC token from PyPI
      contents: read   # Allows the action to checkout your repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build source and wheel distribution
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password or token is needed here because of OIDC!
